[workspace]
members = [
    "crates/prism-agent",
    "crates/prism-cli",
    "crates/prism-core",
    "crates/prism-ir",
    "crates/prism-lang-json",
    "crates/prism-lang-markdown",
    "crates/prism-lang-rust",
    "crates/prism-lang-yaml",
    "crates/prism-parser",
    "crates/prism-query",
    "crates/prism-store",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT"
version = "0.1.0"

[workspace.dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
regex = "1.11"
serde_json = "1.0"
serde_yaml = "0.9"
smol_str = "0.2"
walkdir = "2.5"
